<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luma Sampaio — Portfólio</title>

<!-- 🔤 Fonte padrão do projeto: Inter (usada em todas as páginas) -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* ══════════════════════════════════
   🎨 VARIÁVEIS GLOBAIS DE COR
══════════════════════════════════ */
:root {
  --bg: #080A10; --surface: #0F1220; --surface2: #161A28;
  --border: rgba(255,255,255,.07); --border2: rgba(255,255,255,.13);
  --orange: #FF6B1A; --orange2: #FF8C42; --coral: #FF4D6D;
  --teal: #06D6A0; --blue: #4EA8FF;
  --text: #F0F2FF; --text2: #8B91B0; --text3: #4A5070;
}

/* ─── RESET BÁSICO ─── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow-x: hidden;
}

/* ─── FUNDO DECORATIVO ─── */
.bg-grid {
  position: fixed; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(255,107,26,.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,107,26,.035) 1px, transparent 1px);
  background-size: 60px 60px;
}
.orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: .15; pointer-events: none; }
.orb-1 { width: 500px; height: 500px; background: radial-gradient(circle,#FF6B1A,transparent); top: -200px; right: -100px; }
.orb-2 { width: 400px; height: 400px; background: radial-gradient(circle,#06D6A0,transparent); bottom: -150px; left: -80px; }

/* ─── CONTAINER ─── */
.wrap {
  position: relative; z-index: 10;
  width: 100%; max-width: 820px;
  padding: 40px 24px 80px;
  animation: fadeUp .7s cubic-bezier(.4,0,.2,1) both;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(24px) } to { opacity:1; transform:translateY(0) } }

/* ─── PERFIL: foto + nome ─── */
.profile-row {
  display: flex; align-items: center; gap: 24px;
  margin-bottom: 28px; justify-content: center; flex-wrap: wrap;
}

/* 🖼️ Moldura discreta — sem gradiente chamativo */
.avatar-frame {
  width: 88px; height: 88px; border-radius: 50%;
  border: 2px solid rgba(255,107,26,.28);
  padding: 2px; flex-shrink: 0; position: relative;
}
.avatar-frame img {
  width: 100%; height: 100%; border-radius: 50%;
  object-fit: cover; display: block;
  border: 2px solid var(--bg);
}
.avatar-fallback {
  display: none; width: 100%; height: 100%; border-radius: 50%;
  background: linear-gradient(135deg,#FF8C42,#FF4D6D);
  align-items: center; justify-content: center;
  font-size: 24px; font-weight: 800; color: white;
}
/* Ponto verde de disponibilidade */
.status-dot {
  position: absolute; bottom: 4px; right: 4px;
  width: 13px; height: 13px; border-radius: 50%;
  background: var(--teal); box-shadow: 0 0 8px var(--teal);
  border: 2px solid var(--bg); animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

.identity { text-align: left; }
.badge-avail {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(6,214,160,.1); border: 1px solid rgba(6,214,160,.25);
  border-radius: 30px; padding: 4px 12px;
  font-size: 10px; font-weight: 600; letter-spacing: 1.8px;
  text-transform: uppercase; color: var(--teal); margin-bottom: 8px;
}
.identity h1 {
  font-size: clamp(28px,5vw,50px); font-weight: 900; letter-spacing: -1.5px;
  background: linear-gradient(135deg,#FF8C42,#FF4D6D);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; line-height: 1.05; margin-bottom: 4px;
}
.identity .role { font-size: 14px; color: var(--text2); font-weight: 400; }
.identity .role strong { color: var(--orange2); font-weight: 700; }

/* ─── DIVISOR ─── */
.divider {
  width: 40px; height: 2px;
  background: linear-gradient(90deg,var(--orange),var(--coral));
  border-radius: 2px; margin: 0 auto 22px;
}

/* ─── BOTÃO DOWNLOAD CURRÍCULO ─── */
.cv-wrap { text-align: center; margin-bottom: 24px; }
.cv-btn {
  display: inline-flex; align-items: center; gap: 9px;
  background: linear-gradient(135deg,var(--orange),var(--coral));
  color: white; font-weight: 700; font-size: 13px; font-family: 'Inter',sans-serif;
  padding: 12px 26px; border-radius: 12px; text-decoration: none;
  box-shadow: 0 0 26px rgba(255,107,26,.3); transition: all .3s;
}
.cv-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 34px rgba(255,107,26,.5); }

/* ─── LABEL DE SEÇÃO ─── */
.sec-label {
  font-size: 10px; font-weight: 700; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--text3);
  margin-bottom: 14px; text-align: center;
}

/* ─── CARDS DE VERSÃO (Desktop / Mobile) ─── */
.nav-cards { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px; }
.nav-card {
  display: flex; align-items: center; gap: 14px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 18px 22px;
  text-decoration: none; color: var(--text);
  transition: all .3s; min-width: 200px; flex: 1; max-width: 280px;
  position: relative; overflow: hidden;
}
.nav-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  opacity: 0; transition: opacity .3s;
}
.nav-card.desktop::before { background: linear-gradient(90deg,var(--orange),var(--coral)); }
.nav-card.mobile::before  { background: linear-gradient(90deg,var(--teal),var(--blue)); }
.nav-card:hover { transform: translateY(-4px); border-color: rgba(255,107,26,.3); box-shadow: 0 14px 44px rgba(255,107,26,.12); }
.nav-card:hover::before { opacity: 1; }
.nav-card .c-ico { font-size: 26px; flex-shrink: 0; }
.nav-card .c-title { font-size: 15px; font-weight: 700; }
.nav-card .c-desc { font-size: 11px; color: var(--text2); margin-top: 3px; }
.nav-card .c-arrow { margin-left: auto; font-size: 18px; color: var(--text3); transition: transform .2s; }
.nav-card:hover .c-arrow { transform: translateX(4px); color: var(--orange2); }

/* ─── LINKS DOS DASHBOARDS ─── */
.dash-links { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
.dash-link {
  display: flex; align-items: center; gap: 7px;
  background: rgba(255,255,255,.04); border: 1px solid var(--border);
  border-radius: 10px; padding: 9px 16px;
  font-size: 12px; font-weight: 600; color: var(--text2); text-decoration: none;
  transition: all .25s;
}
.dash-link:hover { border-color: rgba(255,107,26,.3); color: var(--orange2); background: rgba(255,107,26,.07); transform: translateY(-2px); }

/* ─── CHIPS DE TECNOLOGIAS ─── */
.chips { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; }
.chip { background: rgba(255,255,255,.04); border: 1px solid var(--border); border-radius: 7px; padding: 4px 10px; font-size: 10px; font-weight: 600; color: var(--text3); }
.chip.hi { background: rgba(255,107,26,.08); border-color: rgba(255,107,26,.2); color: var(--orange2); }

/* ─── DICA INFERIOR ─── */
.device-hint {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: rgba(8,10,16,.95); backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  padding: 12px; text-align: center;
  font-size: 11px; color: var(--text3);
}

/* ─── RESPONSIVO ─── */
@media (max-width: 540px) {
  .profile-row { flex-direction: column; text-align: center; }
  .identity { text-align: center; }
  .nav-cards { flex-direction: column; align-items: center; }
  .nav-card { width: 100%; max-width: 320px; }
}
</style>
</head>
<body>

<!-- 🌐 Fundo decorativo -->
<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="wrap">

  <!-- 👤 Foto + Nome + Cargo -->
  <div class="profile-row">
    <div class="avatar-frame">
      <img
        src="https://media.licdn.com/dms/image/v2/D4D03AQG4qqPv1u93Wg/profile-displayphoto-shrink_400_400/profile-displayphoto-shrink_400_400/0/1729132579927?e=1776297600&v=beta&t=ZWWgBs_TiIGun8bTTPuxDJfL6TpwD2fMXYOvE75vp-8"
        alt="Luma Sampaio"
        onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
      >
      <div class="avatar-fallback">LS</div>
      <span class="status-dot"></span>
    </div>
    <div class="identity">
      <div class="badge-avail">
        <span style="width:5px;height:5px;border-radius:50%;background:var(--teal);flex-shrink:0;animation:blink 2s infinite;"></span>
        Disponível
      </div>
      <h1>Luma Sampaio</h1>
      <p class="role"><strong>Analista de Dados</strong> · Power BI Avançado · SQL · Automação</p>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 📥 Download do currículo -->
  <div class="cv-wrap">
    <!-- ⚠️ Coloque o arquivo "Curriculo_Luma_Sampaio.pdf" na mesma pasta do index.html -->
    <a href="Curriculo_Luma_Sampaio.pdf" download="Curriculo_Luma_Sampaio.pdf" class="cv-btn">
      ⬇️ Baixar Currículo em PDF
    </a>
  </div>

  <!-- 🖥️📱 Escolha a versão -->
  <div class="sec-label">Escolha sua experiência</div>
  <div class="nav-cards">
    <a href="portfolio_desktop.html" class="nav-card desktop">
      <span class="c-ico">🖥️</span>
      <div>
        <div class="c-title">Versão Desktop</div>
        <div class="c-desc">Experiência completa e detalhada</div>
      </div>
      <span class="c-arrow">→</span>
    </a>
    <a href="portfolio_mobile.html" class="nav-card mobile">
      <span class="c-ico">📱</span>
      <div>
        <div class="c-title">Versão Mobile</div>
        <div class="c-desc">Otimizado para smartphones</div>
      </div>
      <span class="c-arrow">→</span>
    </a>
  </div>


</div>

<!-- 📡 Dica de dispositivo — apenas sugestão, sem redirecionamento automático -->
<div class="device-hint" id="deviceHint"></div>

<script>
  /* 🔍 Detecta o dispositivo e mostra uma SUGESTÃO.
     Não redireciona automaticamente — o usuário escolhe. */
  (function () {
    var isMobile =
      /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)
      || window.innerWidth < 768;

    var hint = document.getElementById('deviceHint');
    hint.textContent = isMobile
      ? '📱 Dispositivo mobile detectado — recomendamos a Versão Mobile acima.'
      : '🖥️ Desktop detectado — recomendamos a Versão Desktop acima.';
  })();
</script>

</body>
</html>
